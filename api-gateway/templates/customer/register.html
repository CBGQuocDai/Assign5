{% extends 'customer/base.html' %}
{% block title %}Đăng ký{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4 mt-4">
      <h3 class="text-center fw-bold mb-4"><i class="bi bi-person-plus text-danger"></i> Đăng ký tài khoản</h3>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Họ tên</label>
          <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Số điện thoại</label>
          <input type="text" name="phone" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Địa chỉ</label>
          <textarea name="address" class="form-control" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-danger w-100">Đăng ký</button>
      </form>
      <hr>
      <p class="text-center mb-0">Đã có tài khoản? <a href="{% url 'customer_login' %}">Đăng nhập</a></p>
    </div>
  </div>
</div>
{% endblock %}
