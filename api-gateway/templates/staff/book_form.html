{% extends 'staff/base.html' %}
{% block title %}{{ action }} sách{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
  <a href="{% url 'staff_book_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h4 class="fw-bold mb-0">{{ action }} sách</h4>
</div>
<div class="card p-4" style="max-width:700px">
  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label fw-semibold">Tên sách <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" value="{{ book.title|default:'' }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Tác giả</label>
        <select name="author_id" class="form-select">
          {% for a in authors %}
          <option value="{{ a.id }}" {% if book.author_id == a.id %}selected{% endif %}>{{ a.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Thể loại</label>
        <select name="category_id" class="form-select">
          {% for c in categories %}
          <option value="{{ c.id }}" {% if book.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Giá ($) <span class="text-danger">*</span></label>
        <input type="number" name="price" class="form-control" step="0.01" min="0" value="{{ book.price|default:'' }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Tồn kho</label>
        <input type="number" name="stock" class="form-control" min="0" value="{{ book.stock|default:'0' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">ISBN</label>
        <input type="text" name="isbn" class="form-control" value="{{ book.isbn|default:'' }}" placeholder="978-x-xxx-xxxxx-x">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Ngày xuất bản</label>
        <input type="date" name="published_date" class="form-control" value="{{ book.published_date|default:'' }}">
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold">Mô tả</label>
        <textarea name="description" class="form-control" rows="3">{{ book.description|default:'' }}</textarea>
      </div>
      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-danger px-4">
          <i class="bi bi-check-lg"></i> Lưu
        </button>
        <a href="{% url 'staff_book_list' %}" class="btn btn-outline-secondary">Hủy</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
