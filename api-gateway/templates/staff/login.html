<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập Nhân viên | BookStore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 8px 30px rgba(0,0,0,.4); }
    .brand-icon { font-size: 3rem; color: #dc3545; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand-icon"><i class="bi bi-shield-lock"></i></div>
      <h4 class="fw-bold mt-2">Cổng nhân viên</h4>
      <p class="text-muted small">Đăng nhập để quản lý cửa hàng</p>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="post" action="{% url 'staff_login' %}">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control" placeholder="staff@bookstore.vn" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Mật khẩu</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">
        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="{% url 'home' %}" class="text-muted small">← Về trang khách hàng</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
